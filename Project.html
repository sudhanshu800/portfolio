<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Projects</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(135deg,#020617,#0f172a,#020617);
  color:#fff;
  overflow-x:hidden;
}

/* ===== ANIMATED BG ===== */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

.blob{
  position:absolute;
  border-radius:50%;
  filter:blur(100px);
  opacity:0.6;
  animation:move 20s infinite alternate ease-in-out;
}

.blob:nth-child(1){
  width:400px;height:400px;background:#38bdf8;
  top:-100px;left:-100px;
}
.blob:nth-child(2){
  width:350px;height:350px;background:#a78bfa;
  bottom:-120px;right:-100px;
}
.blob:nth-child(3){
  width:300px;height:300px;background:#22c55e;
  top:40%;left:40%;
}

@keyframes move{
  100%{transform:translate(150px,100px);}
}

/* ===== NAVBAR ===== */
nav{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.05);
  border-bottom:1px solid rgba(255,255,255,0.1);
  z-index:1000;
}

nav h2{
  font-weight:600;
  letter-spacing:1px;
}

nav ul{
  display:flex;
  gap:25px;
}

nav ul li{
  list-style:none;
}

nav a{
  color:#fff;
  text-decoration:none;
  transition:0.3s;
}

nav a:hover{
  color:#38bdf8;
}

.menu{
  display:none;
  font-size:28px;
  cursor:pointer;
}

/* ===== MOBILE MENU ===== */
.mobile{
  position:fixed;
  top:0;
  right:-100%;
  width:260px;
  height:100%;
  background:#020617;
  padding:30px;
  transition:0.4s ease;
  z-index:2000;
  box-shadow:-5px 0 20px rgba(0,0,0,0.5);
}

.mobile ul{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.mobile a{
  color:#fff;
  text-decoration:none;
}

.close{
  font-size:28px;
  margin-bottom:20px;
  cursor:pointer;
}

/* ===== TITLE ===== */
.title{
  margin-top:110px;
  text-align:center;
  font-size:2.5rem;
  background:linear-gradient(to right,#38bdf8,#a78bfa);
  -webkit-background-clip:text;
  color:transparent;
}

/* ===== FILTER ===== */
.filters{
  text-align:center;
  margin:30px 0;
}

.filters button{
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:30px;
  background:#111827;
  color:#fff;
  cursor:pointer;
  transition:0.3s;
}

.filters button:hover{
  background:#38bdf8;
  color:#000;
}

.filters .active{
  background:#38bdf8;
  color:#000;
}

/* ===== GRID ===== */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:25px;
  padding:20px;
  max-width:1200px;
  margin:auto;
}

/* ===== CARD ===== */
.card{
  position:relative;
  overflow:hidden;
  border-radius:15px;
  background:#111;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  transition:0.5s;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  opacity:0;
  transition:0.4s;
}

.card:hover img{
  transform:scale(1.1);
}

.card:hover .overlay{
  opacity:1;
}

.overlay h3{
  margin-bottom:10px;
}

.overlay a{
  margin:5px;
  padding:8px 14px;
  background:#38bdf8;
  color:#000;
  text-decoration:none;
  border-radius:8px;
  transition:0.3s;
}

.overlay a:hover{
  background:#0ea5e9;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  nav ul{
    display:none;
  }
  .menu{
    display:block;
  }
}
</style>
</head>

<body>

<div class="bg">
  <div class="blob"></div>
  <div class="blob"></div>
  <div class="blob"></div>
</div>

<nav>
  <h2>Sudhanshu</h2>

  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="About.html">About</a></li>
    <li><a href="#">Projects</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>

  <div class="menu" onclick="toggle()">☰</div>
</nav>

<div class="mobile" id="mobile">
  <div class="close" onclick="toggle()">✖</div>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="About.html">About</a></li>
    <li><a href="#">Projects</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</div>

<h1 class="title">My Projects</h1>

<div class="filters">
  <button class="active" onclick="filter('all',event)">All</button>
  <button onclick="filter('web',event)">Web</button>
  <button onclick="filter('ui',event)">UI</button>
</div>

<div class="container">

  <div class="card web">
    <img src="images/mywork99.png">
    <div class="overlay">
      <h3>Hotel Website</h3>
      <a href="https://hotel-livid-delta.vercel.app/">Live</a>
      <a href="#">GitHub</a>
    </div>
  </div>

  <div class="card ui">
    <img src="https://source.unsplash.com/600x400/?app">
    <div class="overlay">
      <h3>App UI Design</h3>
      <a href="#">Live</a>
      <a href="#">GitHub</a>
    </div>
  </div>

  <div class="card web">
    <img src="https://source.unsplash.com/600x400/?coding">
    <div class="overlay">
      <h3>Web Application</h3>
      <a href="#">Live</a>
      <a href="#">GitHub</a>
    </div>
  </div>

  <div class="card ui">
    <img src="https://source.unsplash.com/600x400/?dashboard">
    <div class="overlay">
      <h3>Dashboard UI</h3>
      <a href="#">Live</a>
      <a href="#">GitHub</a>
    </div>
  </div>

  <div class="card web">
    <img src="https://source.unsplash.com/600x400/?startup">
    <div class="overlay">
      <h3>Startup Website</h3>
      <a href="#">Live</a>
      <a href="#">GitHub</a>
    </div>
  </div>

</div>

<script>
function toggle(){
  const menu = document.getElementById("mobile");
  if(menu.style.right === "0px"){
    menu.style.right = "-100%";
  } else {
    menu.style.right = "0";
  }
}

function filter(cat,e){
  let cards = document.querySelectorAll(".card");

  document.querySelectorAll(".filters button")
    .forEach(btn=>btn.classList.remove("active"));

  e.target.classList.add("active");

  cards.forEach(card=>{
    if(cat==="all" || card.classList.contains(cat)){
      card.style.display="block";
    } else {
      card.style.display="none";
    }
  });
}
</script>

</body>
</html>
